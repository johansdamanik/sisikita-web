name: Deploy frontend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sisikita-web-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static frontend build
        env:
          NUXT_PUBLIC_API_BASE: https://api.sisikita.com
          NUXT_PUBLIC_SITE_URL: https://sisikita.com
        run: npm run generate

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy static files with rsync
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          rsync -az --delete \
            -e "ssh -p $VPS_PORT" \
            .output/public/ \
            "$VPS_USER@$VPS_HOST:/var/www/sisikita.com/current/"

      - name: Smoke test production site
        run: |
          curl -fsS https://sisikita.com >/dev/null
          curl -fsS https://www.sisikita.com >/dev/null
