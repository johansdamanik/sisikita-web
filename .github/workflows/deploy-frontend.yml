name: Deploy frontend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sisikita-web-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static frontend build
        env:
          NUXT_PUBLIC_API_BASE: https://api.sisikita.com
          NUXT_PUBLIC_SITE_URL: https://sisikita.com
        run: npm run generate

      - name: Configure SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh

          if [ -z "${VPS_SSH_KEY:-}" ]; then
            echo "VPS_SSH_KEY secret is empty or missing" >&2
            exit 1
          fi

          printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
            echo "Invalid SSH private key in VPS_SSH_KEY secret" >&2
            exit 1
          fi

          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" 'echo ssh_ok'

      - name: Deploy static files with rsync
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          rsync -az --delete \
            -e "ssh -p $VPS_PORT" \
            .output/public/ \
            "$VPS_USER@$VPS_HOST:/var/www/sisikita.com/current/"

      - name: Smoke test production site
        run: |
          curl -fsS https://sisikita.com >/dev/null
          curl -fsS https://www.sisikita.com >/dev/null
